meters:
- name: site_subscription
  description: Per-site monthly subscription (Basic $10, Pro $30, Scale $100,
    Enterprise contract).
  unit: site
  aggregation: sum
  dimensions:
  - account
  - plan
- name: editor_seats
  description: Add-on per-editor monthly fee ($20-$40 depending on tier).
  unit: seat
  aggregation: sum
  dimensions:
  - account
  - site
- name: bandwidth
  description: Site bandwidth usage in GB; included allowance per plan, overage on Scale
    and Enterprise.
  unit: gigabyte
  aggregation: sum
  dimensions:
  - site
principles:
- name: Visibility
  description: Inventory all Framer sites under each account; tag sites to projects or
    business owners.
- name: Allocation
  description: Allocate site subscriptions and editor add-ons to the team owning each site.
- name: Optimization
  description: Consolidate low-traffic sites onto Basic/Pro; downgrade Scale to Pro when
    traffic permits; reclaim editor seats from inactive collaborators.
- name: Accountability
  description: Assign one Framer account owner per organization; review quarterly site
    inventory and bandwidth usage.
