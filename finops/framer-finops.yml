description: FOCUS-aligned FinOps profile for Framer. Framer prices per site (Free/Basic
  $10 / Pro $30 / Scale $100 + usage / Enterprise custom). Additional editors are an
  add-on at $20-$40/editor/month depending on tier. Site bandwidth and pages are
  plan-level allowances; Scale and Enterprise add usage-based bandwidth components.
