description: Framer plans reconciled against the public Framer pricing page. Framer
  prices each site separately rather than per editor; additional editors are billed as a
  per-editor add-on. Plugin API, Code Components, Code Overrides, and Fetch are available
  cross-tier without an additional fee.
sources:
- https://www.framer.com/pricing/
- https://www.framer.com/developers/
